version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trackpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackpulse
      POSTGRES_PASSWORD: trackpulse
      POSTGRES_DB: trackpulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trackpulse-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: trackpulse-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trackpulse.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
